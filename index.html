<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Issues Tracker</title>
    <!-- Added font awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

    <!-- Added DaisyUI and Tailwind CSS -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- Added google fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">


    <!-- Added CSS file  -->



    <!-- Added font family -->
    <Style>
        * {
            font-family: "Geist", sans-serif;
        }
    </Style>
</head>

<body>
    <div class="min-h-screen max-w-sm bg-base-200 mx-auto space-y-4">
        <div class="flex justify-center pt-16 ">
            <img src="./assets/github-logo.png" alt="">
        </div>
        <h1 class="text-center text-2xl font-bold">GitHub Issues Tracker</h1>
        <h1 class="text-center text-gray-400">Sign in to manage your issues</h1>
    
        <div class="flex justify-center items-center ">
            <fieldset class="fieldset bg-base-200 w-full  p-4 space-y-4">
    
                <label class="label w-full">Username</label>
                <input id="input-username" type="text" class="input w-full rounded-2xl" placeholder="Enter Username" />
                <label class="label">Password</label>
                <input id="input-password" type="password" class="input w-full rounded-2xl" placeholder="Enter Password" />
    
                <button id="login-btn" class="btn btn-soft btn-primary mt-4 w-full rounded-2xl">Login</button>
            </fieldset>
        </div>
    
        <div class="mt-16">
            <h1 class="text-gray-400 text-center">Demo Credentials:</h1>
            <h1 class="text-center font-semibold">Username: admin</h1>
            <h1 class="text-center font-semibold">Password: admin123</h1>
        </div>
    </div>
    
    
    
    <!-- Added JS file  -->
    <script src="./script/login.js"></script>
</body>

</html>
