<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Issues Tracker</title>
    <!-- Added font awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

    <!-- Added DaisyUI and Tailwind CSS -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- Added google fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">


    <!-- Added CSS file  -->



    <!-- Added font family -->
    <Style>
        * {
            font-family: "Geist", sans-serif;
        }
    </Style>
</head>

<body>
    <main>
        <!------------------------------------------------------- Navigation bar  --------------------------------------------------------->
        <div class="navbar bg-base-100 shadow-md flex justify-between">
            <div class="flex justify-between items-center gap-4">
                <img class="w-[36px] h-[36px]" src="./assets/github-logo.png" alt="">
                <h1 class="font-bold text-xl">GitHub Issues Tracker</h1>
            </div>
            <div class="flex justify-between gap-4">
                <label class="input">
                    <svg class="h-[1em] opacity-50" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                        <g stroke-linejoin="round" stroke-linecap="round" stroke-width="2.5" fill="none"
                            stroke="currentColor">
                            <circle cx="11" cy="11" r="8"></circle>
                            <path d="m21 21-4.3-4.3"></path>
                        </g>
                    </svg>
                    <input id="input-search" type="search" required placeholder="Search" />
                </label>
                <button id="btn-search" class="btn btn-primary">Primary</button>
            </div>
    
        </div>
    
        
    
    </main>

    <!-- Added JS file  -->
     <script src="./script/home.js"></script>
</body>

</html>
